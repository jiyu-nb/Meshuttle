server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name meshuttle.example.com;

    ssl_certificate     /etc/letsencrypt/live/meshuttle.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meshuttle.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 2048m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 15s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }
}
