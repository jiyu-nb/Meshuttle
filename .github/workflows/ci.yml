name: CI

on:
  push:
  pull_request:

jobs:
  windows-desktop:
    name: Windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm --prefix client ci
      - run: npm --prefix client run fetch:syncthing
      - run: npm --prefix server test
      - run: npm --prefix client test
      - run: npm --prefix client run test:p2p
      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          Get-ChildItem client,server,tools -Recurse -Include *.js,*.mjs |
            Where-Object { $_.FullName -notmatch 'node_modules|release' } |
            ForEach-Object { node --check $_.FullName; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE } }
      - run: npm --prefix client run dist:win

  macos-desktop:
    name: macOS universal desktop
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm --prefix client ci
      - run: npm --prefix client run fetch:syncthing
      - run: npm --prefix client test
      - run: npm --prefix client run test:p2p
      - run: npm --prefix client run dist:mac

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.1.0
      - name: Build installable debug APK
        run: gradle -p android :app:assembleDebug --stacktrace
