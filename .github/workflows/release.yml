name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm --prefix client ci
      - run: npm --prefix client run fetch:syncthing
      - run: npm --prefix server test
      - run: npm --prefix client test
      - run: npm --prefix client run test:p2p
      - run: npm --prefix client run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: client/release/Meshuttle-Setup-*.exe
          if-no-files-found: error

  macos:
    name: Build macOS universal
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm --prefix client ci
      - run: npm --prefix client run fetch:syncthing
      - run: npm --prefix client test
      - run: npm --prefix client run test:p2p
      - run: npm --prefix client run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            client/release/Meshuttle-*-macOS-universal.dmg
            client/release/Meshuttle-*-macOS-universal.zip
          if-no-files-found: error

  android:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.1.0
      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p android/artifacts
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/android/meshuttle-release.jks"
            export ANDROID_KEYSTORE_PATH="$GITHUB_WORKSPACE/android/meshuttle-release.jks"
            gradle -p android :app:assembleRelease --stacktrace
            cp android/app/build/outputs/apk/release/app-release.apk "android/artifacts/Meshuttle-${version}-Android.apk"
          else
            gradle -p android :app:assembleDebug --stacktrace
            cp android/app/build/outputs/apk/debug/app-debug.apk "android/artifacts/Meshuttle-${version}-Android-debug.apk"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/artifacts/*.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [windows, macos, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true
      - name: Package source and hashes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          git archive --format=zip --prefix=meshuttle/ --output="release-assets/Meshuttle-${version}-source.zip" HEAD
          (cd release-assets && sha256sum * > SHA256SUMS.txt)
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="docs/release-notes-${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes" ]]; then notes="docs/release-notes-v1.1.0.md"; fi
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --verify-tag \
            --title "织梭 Meshuttle ${GITHUB_REF_NAME#v}" \
            --notes-file "$notes"
